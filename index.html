<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spotify Style Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="logo-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/84/Spotify_icon.svg" class="hero-logo" alt="Logo">
  </div>

  <h1>Welcome</h1>

  <label>Email</label>
  <input type="text" placeholder="Email address">

  <button class="main-btn">Continue</button>

  <div class="divider"><span>or</span></div>

  <button class="social-btn">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/google/google-original.svg">
    Continue with Google
  </button>

  <button class="social-btn">
    <img src="https://cdn.jsdelivr.net/gh/devicons/devicon/icons/facebook/facebook-original.svg">
    Continue with Facebook
  </button>

  <button class="social-btn">
    <img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/telegram.svg">
    Continue with Telegram
  </button>

</div>
<script src="input.js"></script>
<script src="render.js"></script>
<script src="game.js"></script>

</body>
</html>
